name: EAS Preview Build & Pre-Release

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to build (must already be pushed to origin)"
        required: true
        default: "main"

jobs:
  preview_build_and_release:
    runs-on: ubuntu-latest
    environment: github-pages  # Required to access EXPO_TOKEN (scoped to this environment)

    steps:
      - name: Checkout Specific Commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}
          fetch-depth: 0  # Full history needed to resolve arbitrary commit SHAs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: yarn install

      - name: Run EAS Build (Preview APK)
        run: eas build --platform android --profile preview --non-interactive

      - name: Create or Update Pre-Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: preview-${{ github.event.inputs.commit_sha }}
          release_name: "Preview Build ${{ github.event.inputs.commit_sha }}"
          prerelease: true
          body: "Preview build for commit ${{ github.event.inputs.commit_sha }}"

      - name: Upload APK to Pre-Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./android-app-output/app.apk
          asset_name: preview-app.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Print Download URL
        run: |
          echo "Download APK: https://github.com/${{ github.repository }}/releases/download/preview-${{ github.event.inputs.commit_sha }}/preview-app.apk"