[versions]
agp = "8.7.3"
kotlin = "2.0.20"
ksp = "2.0.20-1.0.24"
compose-bom = "2024.02.00"
hilt = "2.51.1"
realm = "2.3.0"
ktor = "2.3.7"
kotlinx-serialization = "1.6.3"
kotlinx-coroutines = "1.7.3"
navigation-compose = "2.7.7"
lifecycle = "2.7.0"
datastore = "1.0.0"
coil = "2.5.0"
mediapipe = "0.10.24"  # Highest tasks-genai version published to Maven (0.10.25/26 never released for tasks-genai)
camerax = "1.3.1"
work = "2.9.0"
splashscreen = "1.0.1"
activity-compose = "1.8.2"
core-ktx = "1.12.0"
richtext = "0.17.0"
junit = "4.13.2"
mockk = "1.13.8"

[libraries]
compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "compose-bom" }
compose-ui = { group = "androidx.compose.ui", name = "ui" }
compose-ui-graphics = { group = "androidx.compose.ui", name = "ui-graphics" }
